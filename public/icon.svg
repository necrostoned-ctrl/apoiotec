<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 240">
  <!-- White background -->
  <rect width="192" height="240" fill="white"/>
  
  <!-- Atom icon - neon blue -->
  <!-- Center nucleus -->
  <circle cx="96" cy="80" r="8" fill="#00d4ff" stroke="#0099ff" stroke-width="2"/>
  
  <!-- Orbital electrons -->
  <circle cx="96" cy="80" r="35" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.7" stroke-dasharray="2,3"/>
  <circle cx="96" cy="80" r="35" fill="none" stroke="#0099ff" stroke-width="1" opacity="0.5" transform="rotate(60 96 80)"/>
  <circle cx="96" cy="80" r="35" fill="none" stroke="#0066ff" stroke-width="1" opacity="0.5" transform="rotate(120 96 80)"/>
  
  <!-- Electrons on orbit -->
  <circle cx="131" cy="80" r="3" fill="#00d4ff" filter="url(#glow)"/>
  <circle cx="61" cy="80" r="3" fill="#00d4ff" filter="url(#glow)"/>
  <circle cx="96" cy="115" r="3" fill="#0099ff" filter="url(#glow)"/>
  
  <!-- Glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Text below -->
  <text x="96" y="180" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2563eb">
    Apoiotec Informática
  </text>
  <text x="96" y="205" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#2563eb">
    assessoria e assistência técnica
  </text>
</svg>
