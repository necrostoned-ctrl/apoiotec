# fly.toml app configuration file generated for apoiotec

app = 'apoiotec'
primary_region = 'gru'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
  [processes]
  app = "/bin/sh -c 'swapon /swapfile ; node dist/index.js'"